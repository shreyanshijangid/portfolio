<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSAP Animation</title>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0A0A14;
      color: #fff;
      font-family: system-ui, sans-serif;
    }
    .demo-cards-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      perspective: 1200px;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto;
    }
    
    .demo-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(0, 255, 102, 0.3);
      border-radius: 16px;
      padding: 2rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
      transform-style: preserve-3d;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .demo-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(0, 255, 102, 0.6);
      box-shadow: 0 16px 48px rgba(0, 255, 102, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }
    
    .demo-card-content {
      text-align: center;
      z-index: 2;
    }
    
    .demo-card-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    
    .demo-card h3 {
      font-size: 1.5rem;
      color: #00ff66;
      margin: 0.5rem 0;
      font-weight: 600;
      font-family: 'Schibsted Grotesk', sans-serif;
    }
    
    .demo-card p {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.7);
      margin: 0;
      font-family: 'Schibsted Grotesk', sans-serif;
    }
    
    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>
<body>

<div class="demo-cards-container">
  <div class="demo-card demo-card-1">
    <div class="demo-card-content">
      <div class="demo-card-icon">✨</div>
      <h3>Design</h3>
      <p>Crafted with precision</p>
    </div>
  </div>
  <div class="demo-card demo-card-2">
    <div class="demo-card-content">
      <div class="demo-card-icon">⚡</div>
      <h3>Performance</h3>
      <p>Lightning fast delivery</p>
    </div>
  </div>
  <div class="demo-card demo-card-3">
    <div class="demo-card-content">
      <div class="demo-card-icon">🎯</div>
      <h3>Innovation</h3>
      <p>Always ahead of curve</p>
    </div>
  </div>
  <div class="demo-card demo-card-4">
    <div class="demo-card-content">
      <div class="demo-card-icon">🚀</div>
      <h3>Growth</h3>
      <p>Scale with confidence</p>
    </div>
  </div>
</div>

<script>
  gsap.registerPlugin(ScrollTrigger);

  var cards = document.querySelectorAll('.demo-card');
  var tl = gsap.timeline();
  
  // Define staggered entrance directions for each card
  var directions = [
    { x: -400, y: -200, rotationX: -45, rotationY: 45, rotationZ: -30 },  // top-left
    { x: 400, y: -200, rotationX: -45, rotationY: -45, rotationZ: 30 },   // top-right
    { x: -400, y: 200, rotationX: 45, rotationY: 45, rotationZ: 30 },     // bottom-left
    { x: 400, y: 200, rotationX: 45, rotationY: -45, rotationZ: -30 }     // bottom-right
  ];
  
  // Animate cards flying in with 3D rotation and spring physics
  for (var i = 0; i < cards.length; i++) {
    var dir = directions[i];
    var card = cards[i];
    
    // Set initial state
    gsap.set(card, {
      x: dir.x,
      y: dir.y,
      rotationX: dir.rotationX,
      rotationY: dir.rotationY,
      rotationZ: dir.rotationZ,
      opacity: 0
    });
    
    // Animate to center with spring physics
    tl.to(card, {
      x: 0,
      y: 0,
      rotationX: 0,
      rotationY: 0,
      rotationZ: 0,
      opacity: 1,
      duration: 4.2,
      ease: "power2.out",
      delay: 0 + (i * 0.1),
    }, 0);
  }
  
</script>
</body>
</html>
